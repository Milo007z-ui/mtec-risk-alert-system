<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ระบบแจ้งเตือนจุดเสี่ยงอุบัติเหตุ — กรุงเทพฯ และปริมณฑล</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="status-bar">
    <span id="gps-status">กำลังโหลด...</span>
    <span id="nearest-info"></span>
    <a id="link-dashboard" href="dashboard.html" title="ดูสถิติ">📊 สถิติ</a>
  </div>

  <div id="map"></div>

  <div id="alert-banner" class="alert-banner hidden"></div>

  <button id="btn-recenter" class="hidden">📍 กลับมาที่ตำแหน่งฉัน</button>

  <div id="legend">
    <div><span class="dot" style="background:#c62828"></span> เสี่ยงสูง</div>
    <div><span class="dot" style="background:#ef6c00"></span> ปานกลาง</div>
    <div><span class="dot" style="background:#f9a825"></span> ต่ำ</div>
  </div>

  <div id="start-overlay">
    <div class="start-card">
      <h1>🚨 ระบบแจ้งเตือนจุดเสี่ยงอุบัติเหตุ</h1>
      <p>กรุงเทพฯ และปริมณฑล — แจ้งเตือนด้วยเสียงเมื่อเข้าใกล้จุดเสี่ยงในระยะ 500 เมตร</p>
      <button id="btn-start">เริ่มใช้งาน</button>
      <p class="hint">ต้องอนุญาตให้เข้าถึงตำแหน่ง และเปิดเสียงเครื่อง</p>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/distance.js"></script>
  <script src="js/tts.js"></script>
  <script src="js/riskpoints.js"></script>
  <script src="js/map.js"></script>
  <script src="js/gps.js"></script>
  <script src="js/alert.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
